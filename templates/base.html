<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamila Khamraeva — IT Portfolio</title>
    <!-- Google Fonts: Space Grotesk (Tech Headings) and Inter (Premium Body UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (for speedy styling and utility layouts) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            purple: '#F97316', // Sleek Orange-500
                            violet: '#EC4899', // Sleek Pink-500
                            teal: '#8B5CF6',   // Sleek Purple-600
                            cyan: '#A855F7',   // Sleek Purple-500
                            dark: '#050505',   // Sleek Space Black
                            light: '#FAFAFA'
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS (for deep cinematic effects, floating shapes, scroll reveals) -->
    <link rel="stylesheet" href="/static/css/style.css">
    
    <!-- Lucide Icons (Official library in vanilla JS context) -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#050505] text-gray-100 font-sans selection:bg-brand-purple selection:text-white overflow-x-hidden transition-colors duration-300">
    
    <!-- Background Animated Mesh and Particles -->
    <div class="fixed inset-0 -z-50 overflow-hidden pointer-events-none" id="hero-canvas-container">
        <!-- Modern CSS Ambient Mesh lights -->
        <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-brand-purple/20 blur-[130px] animate-pulse"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-brand-teal/20 blur-[150px]"></div>
        <div class="absolute top-[40%] left-[50%] -translate-x-1/2 w-[35rem] h-[35rem] rounded-full bg-brand-violet/10 blur-[120px] animate-pulse" style="animation-duration: 8s;"></div>
        
        <!-- Interactive Canvas Particles -->
        <canvas id="ambient-canvas" class="absolute inset-0 w-full h-full opacity-60 dark:opacity-40 transition-opacity duration-500"></canvas>
    </div>

    <!-- Base Layout Header / Navigation -->
    {% include "components/header.html" %}

    <!-- Main Dynamic Slot -->
    <main class="min-h-screen">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Base Layout Footer -->
    {% include "components/footer.html" %}

    <!-- Custom Core App Scripts (Handles language transitions, theme toggling, modular modal management, animations) -->
    <script src="/static/js/main.js"></script>
    <script>
        // Trigger lucide icons loading
        lucide.createIcons();
    </script>
</body>
</html>
